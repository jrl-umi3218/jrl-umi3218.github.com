name: Notify website deployment
on:
  push:
    branches:
      - master

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy-website dispatch
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: token ${{ secrets.DEPLOY_DISPATCH_TOKEN }}" \
            https://api.github.com/repos/isri-aist/Website-deployment/dispatches \
            -d '{"event_type":"deploy-website"}'
