name: CNRS-AIST JRL
# Note: GitHub only supports pygments, while rouge is the default highlighter.
# Thus, we comment it and simply rely on the default highlighter.
# highlighter: pygments
plugins:
    - jekyll-sitemap
    - jekyll-redirect-from
    - jekyll-polyglot
exclude: ['Gemfile', 'Gemfile.lock', 'LICENSE', 'README.md', 'vendor']
languages: ["en", "jp"]
default_lang: "en"
exclude_from_localization: ["assets", "css", "js", "font-awesome", "fonts", "projects/janus"]
lang_from_path: true
country_flag: false
